<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body id="page">
    <div class="button">
        <button onclick="openPage('https://www.google.com')">GOOGLE</button>
        <button onclick="openPage('https://www.instagram.com')">INSTAGRAM</button>
        <button onclick="openPage('https://www.youtube.com')">YOUTUBE</button>
        <button onclick="openPage('https://www.facebook.com')">FACEBOOK</button>
    </div>
    <script>
        function openPage(url) {
            window.open(url, "_blank");
        }

    </script>
</body>
</html>
