<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: auto;
        
    }

    .login-form {
        background-color: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 600px;
    }
    .login-form h1 {
        margin-bottom: 10px;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #0c1f66;

    }
    .login-form input,
    .login-form select
     {
        width: 600px;
        padding: 8px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .login-form input[type="submit"] {
        background-color: #0c1f66;
        color: white;
        padding: 10px 30px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
</style>
<body>
    <form class="login-form">
        <h1>Registration Form</h1>

        <input placeholder="Enter Name" type="text" id="name"><br><br>

        <input placeholder="Enter Course" type="text" id="Course"><br><br>

        <input placeholder="Enter College" type="text" id="College"><br><br>

        <input type="submit" value="Register">
    </form>
    <script>
        
    </script>
</body>
</html>
