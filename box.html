<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
          body {
        font-family: Arial, sans-serif;
        background-color: #181515;
        display: flex;
        justify-content: center;
        align-items: center;
        height: auto;
        
    }
    form {
        background-color: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(27, 27, 27, 0.1);
        width: 400px;
        text-align: center;
        display: flex;
        flex-direction: column;
        padding: 45px;
    }
    form h1 {
        margin-bottom: 20px;
        color: #0c1f66;
        display: flex;
        justify-content: center;
    }
    .button {
        background-color: #0c1f66;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 10px 0;

    }
    .button:hover {
        background-color: #273466;
    }
    </style>
<body>
    <form>
        <h1>JavaScript Pop-up Boxes</h1>
        <button class="button" onclick="alert('This is an alert box!')">Alert Box</button>
        <button class="button" onclick="confirm('Do you want to proceed?')">Confirm Box</button>
        <button class="button" onclick="prompt('Please enter your name:')">Prompt Box</button>
    </form>
   
</body>
</html>
